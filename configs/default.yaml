# Config for Vietnamese handwritten OCR (ResNet-18 CRNN + CTC), line images only.
# image → preprocess → ResNet18 → BiLSTM → Linear → CTC

project:
  name: vie-handwritten
  seed: 42

data:
  # HWDB_line layout (split chính thức theo người viết):
  #   data/images/HWDB_line/{train_data,test_data}/<writer>/label.json + *.jpg
  root_dir: data/images
  manifest_dir: data/manifests   # → {train,val,test}.jsonl
  train_subdir: train_data
  test_subdir: test_data
  val_writers_ratio: 0.1         # tách ~10% writers từ train_data làm val
  max_val_samples: 2000          # giới hạn số mẫu val cho nhanh
  drop_oov: true                 # bỏ mẫu chứa ký tự ngoài charset
  charset_path: data/charset/vietnamese.txt

preprocess:
  target_height: 64
  max_width: 1536                # nới trần để dòng dài đỡ bị nén (giữ đủ time-step cho CTC)
  pad_value: 255
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  normalize: imagenet            # imagenet mean/std | true ([0,1])
  channels: 3

model:
  pretrained: imagenet           # imagenet | none
  bilstm_units: 256
  bilstm_layers: 2
  dropout: 0.2
  width_downsample: 4            # width→time-step ratio; phải khớp stride của backbone

ctc:
  blank_index: 0
  decode: greedy                 # greedy | beam
  beam_width: 10

train:
  batch_size: 16
  optimizer: adam
  grad_clipnorm: 5.0            # dập gradient spike từ dòng dài (CTC/RNN)
  checkpoint_dir: checkpoints
  report_dir: reports
  log_dir: runs
  early_stopping_patience: 10
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  # Debug: mỗi `decode_eval_every` epoch, decode `decode_eval_samples` mẫu train để
  # log CER/WER + preview (pred vs true) lên TensorBoard. Đặt 0 để tắt.
  decode_eval_samples: 128
  decode_eval_every: 1
  # Phase 1: đóng băng CNN, chỉ train BiLSTM head trên tập nhỏ để head hội tụ nhanh.
  phase1:
    epochs: 15
    learning_rate: 0.001
    max_train_samples: 2000      # tập nhỏ
  # Phase 2: mở băng toàn bộ, train cả CNN + BiLSTM trên toàn bộ dữ liệu.
  phase2:
    epochs: 40
    learning_rate: 0.0001
    max_train_samples: null      # dùng toàn bộ
