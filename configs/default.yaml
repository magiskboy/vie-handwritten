# Default config for Vietnamese handwritten OCR (ResNet-18 + Transformer + CTC)
# image → preprocess → ResNet18 → Transformer Encoder → Linear → CTC

project:
  name: vie-handwritten
  seed: 42

data:
  # data/vn_handwritten_images/
  #   labels.json          # {"1.jpg": "Số 3 ...", "0001_samples.png": "...", ...}
  #   data/<filename>      # ảnh dòng chữ (png/jpg/jpeg)
  dataset_dir: data/vn_handwritten_images
  images_subdir: data
  labels_file: labels.json
  processed_dir: data/processed
  charset_path: data/charset/vietnamese.txt
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

preprocess:
  target_height: 64
  # Keep aspect ratio; pad width to batch max (best practice for HTR)
  max_width: 1024
  pad_value: 255
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  use_adaptive_threshold: false
  normalize: imagenet  # ImageNet mean/std (or true for [0,1])
  channels: 3
  # Light train-time augmentation (compensates for the small dataset)
  augment:
    enabled: true
    rotate_deg: 2.0     # random rotation ±deg
    shear: 0.05         # x-shear factor
    scale: 0.05         # random zoom ±fraction
    stroke_prob: 0.3    # chance of erode/dilate (stroke-width jitter)
    brightness: 0.1     # random brightness ±fraction
    noise_std: 5.0      # gaussian noise std (0..255 scale)

model:
  backbone: resnet18
  pretrained: imagenet
  # Phase A freezes all; Phase B keeps stem/layer1/layer2 frozen
  freeze_stages: [stem, layer1, layer2]
  stride_policy: htr  # stage3 (2,1), stage4 (1,1) — preserve width for CTC
  # Transformer sequence head (trained from scratch; backbone may be ImageNet)
  d_model: 256
  transformer_layers: 4
  transformer_heads: 4
  transformer_ffn_dim: 1024  # 4 * d_model
  dropout: 0.2  # higher regularization for the small dataset

ctc:
  blank_index: 0  # matches tf.nn.ctc_loss default unless overridden
  decode: greedy  # greedy | beam
  beam_width: 10

train:
  batch_size: 16
  optimizer: adamw  # adam | adamw | sgd
  weight_decay: 0.0001  # used by adamw
  grad_clip_norm: 1.0  # global gradient-norm clipping (Transformer stability)
  # Learning-rate schedule: constant | warmup_cosine
  # warmup_cosine ramps LR up over warmup_ratio of steps, then cosine-decays.
  lr_schedule: warmup_cosine
  warmup_ratio: 0.1   # fraction of each phase's steps used for warmup
  min_lr_ratio: 0.01  # final LR = min_lr_ratio * peak LR
  early_stopping_patience: 10
  # reduce_lr_* only used when lr_schedule=constant
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  checkpoint_dir: checkpoints
  log_dir: runs
  curriculum_short_bias_epochs: 5
  mixed_precision: false
  phases:
    - name: a_head
      epochs: 40
      learning_rate: 0.0003  # peak LR for head-only phase (warmup applied)
      freeze_backbone: true
    - name: b_finetune
      epochs: 60
      learning_rate: 0.0001
      freeze_backbone: false
      unfreeze_from: layer3

eval:
  metrics: [cer, wer]  # Character / Word Error Rate
