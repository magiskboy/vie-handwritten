# Default config for Vietnamese handwritten OCR (ResNet-18 CRNN + CTC)
# image → preprocess → ResNet18 → BiLSTM → Linear → CTC

project:
  name: vie-handwritten
  seed: 42

data:
  # HWDB layout (split chính thức theo người viết):
  #   data/images/HWDB_line/{train_data,test_data}/<writer>/label.json + *.jpg
  #   data/images/HWDB_word/{train_data,test_data}/<writer>/label.json + *.jpg
  # line = ảnh dòng, word = ảnh từ đơn → cùng corpus, đều feed thẳng CRNN+CTC.
  # paragraph (ảnh nguyên trang) hiện KHÔNG dùng để train.
  root_dir: data/images
  manifest_dir: data/manifests
  sources: [line, word]          # nguồn dùng để train CRNN
  val_sources: [line]            # val theo mục tiêu triển khai (đọc dòng)
  eval_source: line              # evaluate mặc định trên line
  train_subdir: train_data
  test_subdir: test_data
  val_writers_ratio: 0.1         # tách ~10% writers từ train_data làm val
  max_val_samples: 2000          # giới hạn số mẫu val cho nhanh
  drop_oov: true                 # bỏ mẫu chứa ký tự ngoài charset
  charset_path: data/charset/vietnamese.txt
  processed_dir: data/processed
  # Trọng số trộn nguồn mặc định (có thể override theo từng pha ở train.phases)
  source_weights: {line: 0.5, word: 0.5}

preprocess:
  target_height: 64
  # Keep aspect ratio; pad width to batch max (best practice for HTR)
  max_width: 1024
  pad_value: 255
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  use_adaptive_threshold: false
  normalize: imagenet  # ImageNet mean/std (or true for [0,1])
  channels: 3

model:
  backbone: resnet18
  pretrained: imagenet
  # Phase A freezes all; Phase B keeps stem/layer1/layer2 frozen
  freeze_stages: [stem, layer1, layer2]
  stride_policy: htr  # stage3 (2,1), stage4 (1,1) — preserve width for CTC
  bilstm_units: 256
  bilstm_layers: 2
  dropout: 0.2

ctc:
  blank_index: 0  # matches tf.nn.ctc_loss default unless overridden
  decode: greedy  # greedy | beam
  beam_width: 10

train:
  batch_size: 16
  optimizer: adam
  # Dataset trộn nguồn lặp vô hạn → cần steps_per_epoch cho mỗi epoch.
  steps_per_epoch: 500
  early_stopping_patience: 10
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  checkpoint_dir: checkpoints
  log_dir: runs
  mixed_precision: false
  phases:
    # Pha A — warmup/head: đóng băng backbone (ImageNet), chỉ train BiLSTM+Dense.
    # Nghiêng về word (110k ảnh, ngắn) để học nhanh ánh xạ đặc trưng→ký tự.
    - name: a_warmup
      epochs: 15
      learning_rate: 0.001
      freeze_backbone: true
      source_weights: {word: 0.7, line: 0.3}
    # Pha B — finetune: mở băng từ layer3 (giữ stem/layer1/layer2), LR nhỏ.
    # Nghiêng về line để chuyên hoá đọc dòng dài / khoảng trắng / ngữ cảnh.
    - name: b_finetune
      epochs: 40
      learning_rate: 0.0001
      freeze_backbone: false
      unfreeze_from: layer3
      source_weights: {line: 0.85, word: 0.15}

eval:
  metrics: [cer, wer]  # Character / Word Error Rate
