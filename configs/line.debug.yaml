# DEBUG — sanity check stage 2 (LINE) trên subset nhỏ TRƯỚC khi train full.
#
# Andrew Ng sanity check: nếu model + loss + data pipeline không bug thì PHẢI overfit
# được vài chục ảnh dòng → train loss ~ 0 và train CER ~ 0. Nếu không hội tụ về ~0 → có bug,
# đừng chạy `make train-line` vội.
#
#   make train CONFIG=configs/line.debug.yaml
#   tensorboard --logdir runs/line_debug
#
# Muốn debug luôn cả luồng curriculum (resume word → line), truyền RESUME:
#   make train CONFIG=configs/line.debug.yaml RESUME=checkpoints/word_debug
# Theo dõi: epoch_loss (val), train_cer/train_wer, lr, tab TEXT/IMAGES (pred vs true).

project:
  name: vie-handwritten-line-debug
  seed: 42

data:
  root_dir: data/images
  dataset_dir: data/images/HWDB_line
  manifest_dir: data/manifests_line    # tái dùng manifest của configs/line.yaml (build nếu thiếu)
  train_subdir: train_data
  test_subdir: test_data
  val_writers_ratio: 0.1
  max_val_samples: 32
  drop_oov: true
  charset_path: data/charset/vietnamese.txt

preprocess:
  target_height: 64
  max_width: 1536
  pad_value: 255
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  normalize: imagenet
  channels: 3

model:
  pretrained: imagenet
  bilstm_units: 256
  bilstm_layers: 2
  dropout: 0.0                   # TẮT regularization để model CÓ THỂ overfit
  width_downsample: 4

ctc:
  blank_index: 0
  decode: greedy
  beam_width: 10

train:
  batch_size: 4
  optimizer: adam
  grad_clipnorm: 5.0
  checkpoint_dir: checkpoints/line_debug
  report_dir: reports/line_debug
  log_dir: runs/line_debug
  early_stopping_patience: 100000   # không dừng sớm khi debug
  reduce_lr_patience: 100000        # giữ learning rate cố định
  reduce_lr_factor: 0.5
  decode_eval_samples: 32           # decode toàn bộ tập nhỏ mỗi epoch
  decode_eval_every: 1
  phase1:
    epochs: 20
    learning_rate: 0.001
    max_train_samples: 32
  phase2:
    epochs: 200
    learning_rate: 0.0005
    max_train_samples: 32
