# Curriculum stage 1 — PRETRAIN trên HWDB_word (ảnh từ đơn, ~108K mẫu).
# Mục tiêu: dạy backbone hình dạng ký tự tiếng Việt (dấu thanh/dấu mũ) trên tập lớn,
# hội tụ nhanh. Weights sinh ra sẽ được nạp lại cho stage line qua `--resume checkpoints/word`.
#
# Chạy:
#   vie-ocr build-data --config configs/word.yaml
#   vie-ocr train      --config configs/word.yaml
# image → preprocess → ResNet18 → BiLSTM → Linear → CTC

project:
  name: vie-handwritten-word
  seed: 42

data:
  root_dir: data/images
  dataset_dir: data/images/HWDB_word   # ← khác default: pretrain trên ảnh từ
  manifest_dir: data/manifests_word    # tách riêng để không đè manifest line
  train_subdir: train_data
  test_subdir: test_data
  val_writers_ratio: 0.1
  max_val_samples: 2000
  drop_oov: true
  charset_path: data/charset/vietnamese.txt   # cùng charset với line → num_classes khớp

# Preprocess giữ GIỐNG HỆT stage line để backbone thấy cùng phân phối ảnh (quan trọng cho transfer).
preprocess:
  target_height: 64
  max_width: 1536
  pad_value: 255
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid: [8, 8]
  normalize: imagenet
  channels: 3

model:
  pretrained: imagenet
  bilstm_units: 256
  bilstm_layers: 2
  dropout: 0.2
  width_downsample: 4

ctc:
  blank_index: 0
  decode: greedy
  beam_width: 10
  lm_path: lm/vi.binary
  lexicon_path: data/charset/vi_syllables.txt
  unigrams_path: lm/unigrams.txt
  alpha: 0.5
  beta: 1.0
  token_min_logp: -5.0
  beam_prune_logp: -10.0

postprocess:
  underthesea: true
  underthesea_tokenizer: regex
  nfc: true
  normalize_tone_marks: true

train:
  batch_size: 16
  optimizer: adam
  grad_clipnorm: 5.0
  checkpoint_dir: checkpoints/word   # ← đích để stage line --resume
  report_dir: reports/word
  log_dir: runs/word
  early_stopping_patience: 8
  reduce_lr_patience: 4
  reduce_lr_factor: 0.5
  decode_eval_samples: 128
  decode_eval_every: 1
  # Word ngắn, tập rất lớn → hội tụ nhanh. Có thể tăng max_train_samples nếu muốn phủ hết 108K.
  phase1:
    epochs: 8
    learning_rate: 0.001
    max_train_samples: 3000
  phase2:
    epochs: 20
    learning_rate: 0.0001
    max_train_samples: 40000     # cap để mỗi epoch không quá nặng; đặt null để dùng toàn bộ
